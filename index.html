<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Plotter Controller - Hochschule Schmalkalden</title>
    <style>
        :root {
            --bg-dark: #071630;
            --sidebar-bg: #0b2246;
            --sidebar-active: #163566;
            --panel-bg: #091d3a;
            --panel-border: #1a3c6d;
            --text-main: #ffffff;
            --text-muted: #8fa0ba;
            --accent-blue: #225199;
            --btn-light: #e2e8f0;
            --btn-light-hover: #cbd5e1;
            --text-dark: #0f172a;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --action-cyan: #38bdf8;
            --action-cyan-hover: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR (DESKTOP) --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--panel-border);
            z-index: 10;
            height: 100%;
        }

        .brand-container {
            padding: 20px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .uni-logo-img {
            width: 100%;
            height: auto;
            max-height: 60px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .nav-menu {
            list-style: none;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: var(--sidebar-active);
            color: var(--text-main);
        }

        /* --- MAIN CONTENT CONTAINER --- */
        .main-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            height: 100%;
            width: calc(100% - 280px);
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .tab-content {
            display: none;
            grid-template-columns: subgrid;
            grid-column: span 2;
            gap: 15px;
            height: 100%;
        }

        .tab-content.active {
            display: grid;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            min-height: 0;
        }

        .visualizer-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0b2246 0%, #071630 100%);
        }

        .plot-canvas {
            border: 1px dashed rgba(255, 255, 255, 0.1);
            width: 100%;
            height: 100%;
        }

        .draw-status-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 5px 10px;
            border-radius: 20px;
            background-color: rgba(0,0,0,0.35);
            color: var(--text-muted);
            border: 1px solid var(--panel-border);
        }

        .draw-status-badge.drawing {
            color: var(--action-cyan);
            border-color: var(--action-cyan);
        }

        .control-panel {
            justify-content: flex-start;
            overflow-y: auto;
        }

        .panel-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 8px;
            line-height: 1.4;
        }

        /* ESP Connection Layout with Manual IP Inputs */
        .esp-status-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--panel-border);
            font-size: 0.8rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .esp-label {
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .esp-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            color: var(--danger);
            transition: color 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--danger);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .ip-input-field {
            width: 100%;
            background-color: rgba(7, 22, 48, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            padding: 6px 10px;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            outline: none;
            text-align: center;
        }

        .ip-input-field:focus {
            border-color: var(--action-cyan);
        }

        .connect-btn {
            width: 100%;
            padding: 8px;
            background-color: var(--sidebar-active);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .connect-btn:hover {
            background-color: #1e4680;
        }

        .connect-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* Action Buttons Styling */
        .task-control-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
        }

        .primary-task-btn {
            padding: 10px;
            background-color: var(--action-cyan);
            color: var(--text-dark);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background-color 0.1s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-task-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-dark);
        }

        .primary-task-btn:hover {
            background-color: var(--action-cyan-hover);
        }

        .primary-task-btn:active {
            transform: scale(0.97);
        }

        .primary-task-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* D-Pad Manual Jog Layout */
        .dpad-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 2px 0;
        }

        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 45px);
            grid-template-rows: repeat(3, 45px);
            gap: 8px;
        }

        .dpad-btn {
            background-color: var(--btn-light);
            border: none;
            border-radius: 8px;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.1s, transform 0.05s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .dpad-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-dark);
        }

        .dpad-btn:hover {
            background-color: var(--btn-light-hover);
        }

        .dpad-btn:active {
            transform: scale(0.94);
        }

        .dpad-btn.home-btn {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: var(--success);
            color: var(--text-main);
            box-shadow: 0 3px 8px rgba(16, 185, 129, 0.3);
        }

        .dpad-btn.home-btn:hover {
            background-color: var(--success-hover);
        }

        /* Pen Position Sub-panel Control Module */
        .pen-control-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .pen-btn {
            padding: 10px;
            border: 1px solid var(--panel-border);
            background-color: var(--sidebar-active);
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.1s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        .pen-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .pen-btn:hover {
            background-color: #1e4680;
        }

        .pen-btn:active {
            transform: scale(0.97);
        }

        /* --- SPEED SELECT (replaces slider) --- */
        .speed-control-container {
            width: 100%;
        }

        .speed-label-wrapper {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .speed-btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
        }

        .speed-btn {
            padding: 10px 6px;
            border: 1px solid var(--panel-border);
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        .speed-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .speed-btn:active {
            transform: scale(0.96);
        }

        .speed-btn.active {
            background-color: var(--action-cyan);
            color: var(--text-dark);
            border-color: var(--action-cyan);
            box-shadow: 0 3px 8px rgba(56, 189, 248, 0.25);
        }

        /* Emergency & Reset Action Bar layout */
        .safety-control-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .estop-btn {
            padding: 10px;
            background-color: var(--danger);
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background-color 0.1s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        .estop-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .estop-btn:hover {
            background-color: var(--danger-hover);
        }

        .estop-btn:active {
            transform: scale(0.97);
        }

        .reset-btn {
            padding: 10px;
            background-color: #4b5563;
            color: var(--text-main);
            border: 1px solid #6b7280;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background-color 0.1s, transform 0.05s;
        }

        .reset-btn:hover {
            background-color: #374151;
        }

        .reset-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* --- SETTINGS VIEW STYLES --- */
        .settings-panel {
            grid-column: span 2;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .setting-group input, .setting-group select {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            padding: 12px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }

        .setting-group input:focus {
            border-color: #38bdf8;
        }

        .save-btn {
            padding: 14px;
            background-color: var(--sidebar-active);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .save-btn:hover {
            background-color: #1e4680;
        }

        /* --- GALLERY VIEW STYLES --- */
        .gallery-panel {
            grid-column: span 2;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .gallery-item {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .gallery-item:hover {
            border-color: #38bdf8;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .gallery-preview {
            height: 100px;
            background-color: rgba(7, 22, 48, 0.5);
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gallery-title {
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* --- BOTTOM LIVE STATUS MONITOR TERMINAL --- */
        .terminal-container {
            display: flex;
            flex-direction: column;
            height: 180px;
            min-height: 140px;
            background-color: rgba(5, 15, 30, 0.95);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            width: 100%;
        }

        .terminal-header {
            background-color: #050f1e;
            padding: 6px 15px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--panel-border);
            text-transform: uppercase;
        }

        .bottom-row {
            flex: 1;
            padding: 10px 15px;
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .status-highlight { color: #38bdf8; font-weight: bold; }
        .alert-highlight { color: var(--danger); font-weight: bold; }
        .success-highlight { color: var(--success); font-weight: bold; }
        .warning-highlight { color: var(--warning); font-weight: bold; }

        /* --- MOBILE LAYOUT QUERY --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--panel-border);
            }

            .brand-container {
                padding: 12px;
            }

            .uni-logo-img {
                max-height: 45px;
            }

            .nav-menu {
                flex-direction: row;
                justify-content: space-around;
                padding: 8px;
                gap: 5px;
            }

            .nav-item {
                flex: 1;
                justify-content: center;
                padding: 10px 5px;
                font-size: 0.85rem;
                gap: 6px;
            }

            .main-layout {
                height: auto;
                width: 100%;
                overflow-y: visible;
                padding: 10px;
            }

            .top-row {
                grid-template-columns: 1fr;
            }

            .tab-content {
                grid-template-columns: 1fr;
                grid-column: span 1;
            }

            .visualizer-panel {
                min-height: 300px;
            }

            .control-panel {
                gap: 18px;
            }

            .dpad-container {
                grid-template-columns: repeat(3, 65px);
                grid-template-rows: repeat(3, 65px);
            }

            .terminal-container {
                height: 160px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-container">
            <img src="hsm logo.png" alt="Hochschule Schmalkalden Logo" class="uni-logo-img">
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab(this, 'main')">
                <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69-.98l.38-2.65c.03-.24.24-.42.49-.42h4c.25 0 .46.18.49.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                <span>Control</span>
            </li>
            <li class="nav-item" onclick="switchTab(this, 'settings')">
                <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
                <span>Settings</span>
            </li>
            <li class="nav-item" onclick="switchTab(this, 'gallery')">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <span>Gallery</span>
            </li>
        </ul>
    </div>

    <div class="main-layout">
        <div class="top-row">

            <div id="tab-main" class="tab-content active">
                <div class="panel visualizer-panel">
                    <div class="draw-status-badge" id="drawStatusBadge">IDLE</div>
                    <svg class="plot-canvas" id="main-vector-preview" viewBox="0 0 300 200">
                        <polyline id="vector-path" points="" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <circle id="pen-tip" cx="-10" cy="-10" r="5" fill="#f59e0b" stroke="#ffffff" stroke-width="1" />
                    </svg>
                </div>

                <div class="panel control-panel">
                    <div class="panel-header">
                        PEN PLOTTER - TEAM 12<br>
                        MERO 2025-26<br>
                        HUMAN MACHINE INTERFACE
                    </div>

                    <div class="esp-status-container">
                        <div class="status-row">
                            <span class="esp-label">ESP32 LINK</span>
                            <div class="esp-badge" id="espBadge">
                                <div class="status-dot" id="espDot"></div>
                                <span id="espText">OFFLINE</span>
                            </div>
                        </div>
                        <input type="text" id="espIpInput" class="ip-input-field" value="192.168.4.1" placeholder="Controller IP (e.g. 192.168.4.1)">
                        <button class="connect-btn" onclick="initWebSocket()">
                            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 9.11 4 10.51 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                            Connect to Controller
                        </button>
                    </div>

                    <div class="task-control-grid">
                        <button class="primary-task-btn" id="drawBtn" onclick="executeNicholasHaus()">
                            <svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3zm0 7.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                            DRAW NICHOLAS HAUS
                        </button>
                    </div>

                    <div class="dpad-wrapper">
                        <div class="dpad-container">
                            <div></div>
                            <button class="dpad-btn" onclick="sendDrive('Y+')">
                                <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                            </button>
                            <div></div>

                            <button class="dpad-btn" onclick="sendDrive('X-')">
                                <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
                            </button>
                            <button class="dpad-btn home-btn" onclick="sendDrive('HOME')">Home</button>
                            <button class="dpad-btn" onclick="sendDrive('X+')">
                                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                            </button>

                            <div></div>
                            <button class="dpad-btn" onclick="sendDrive('Y-')">
                                <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                            </button>
                            <div></div>
                        </div>
                    </div>

                    <div class="pen-control-container">
                        <button class="pen-btn" onclick="setPenState('UP')">
                            <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14z"/></svg>
                            Pen Up
                        </button>
                        <button class="pen-btn" onclick="setPenState('DOWN')">
                            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10z"/></svg>
                            Pen Down
                        </button>
                    </div>

                    <div class="speed-control-container">
                        <div class="speed-label-wrapper">
                            <span>FEEDRATE VELOCITY</span>
                            <span id="speed-display">1x</span>
                        </div>
                        <div class="speed-btn-group">
                            <button class="speed-btn" id="speedBtn-0.5" onclick="selectSpeed(0.5)">0.5x</button>
                            <button class="speed-btn active" id="speedBtn-1" onclick="selectSpeed(1)">1x</button>
                            <button class="speed-btn" id="speedBtn-2" onclick="selectSpeed(2)">2x</button>
                        </div>
                    </div>

                    <div class="safety-control-grid">
                        <button class="estop-btn" onclick="triggerEmergencyStop()">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            EMERGENCY BREAK
                        </button>
                        <button class="reset-btn" onclick="triggerDeviceReset()">
                            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                            RESET DEVICE
                        </button>
                    </div>
                </div>
            </div>

            <div id="tab-settings" class="tab-content">
                <div class="panel settings-panel">
                    <div class="panel-header" style="text-align: left;">Hardware Configuration</div>
                    <div class="settings-grid">
                        <div class="setting-group">
                            <label>Steps per mm (X-Axis)</label>
                            <input type="number" id="stepsX" value="80.00">
                        </div>
                        <div class="setting-group">
                            <label>Steps per mm (Y-Axis)</label>
                            <input type="number" id="stepsY" value="80.00">
                        </div>
                        <div class="setting-group">
                            <label>Max Acceleration (mm/s²)</label>
                            <input type="number" id="accel" value="500">
                        </div>
                        <div class="setting-group">
                            <label>ESP32 Baud Rate</label>
                            <select id="baudRate">
                                <option value="115200">115200</option>
                                <option value="250000">250000</option>
                                <option value="96000">96000</option>
                            </select>
                        </div>
                    </div>
                    <button class="save-btn" onclick="saveSettings()">Flash Parameters to NVRAM</button>
                </div>
            </div>

            <div id="tab-gallery" class="tab-content">
                <div class="panel gallery-panel">
                    <div class="panel-header" style="text-align: left;">Available Vector Templates</div>
                    <div class="gallery-grid">
                        <div class="gallery-item" onclick="loadVector('star')">
                            <div class="gallery-preview">
                                <svg width="50" height="50" viewBox="0 0 24 24"><path fill="none" stroke="#38bdf8" stroke-width="1.5" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            </div>
                            <div class="gallery-title">Geometric Star</div>
                        </div>
                        <div class="gallery-item" onclick="loadVector('grid')">
                            <div class="gallery-preview">
                                <svg width="50" height="50" viewBox="0 0 24 24"><path fill="none" stroke="#38bdf8" stroke-width="1.5" d="M3 3h18v18H3V3zm6 0v18M15 3v18M3 9h18M3 15h18"/></svg>
                            </div>
                            <div class="gallery-title">Calibration Grid</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="terminal-container">
            <div class="terminal-header">Live Status Monitor</div>
            <div class="bottom-row" id="terminal-console">
                [SYSTEM]: Device interface initializing...
            </div>
        </div>
    </div>

    <script>
        let socket;
        let isConnected = false;
        let currentPenState = "UP";
        let autoReconnectInterval = null;
        let activeEmergencyState = false;

        // --- SPEED STATE ---
        let speedMultiplier = 1; // 0.5, 1, or 2 -- used for both ESP command and animation timing

        // --- LIVE-VIEW ANIMATION STATE ---
        // NOTE: The ESP32 firmware currently does not send real position telemetry
        // back over the socket, so this is a SIMULATED replay of the known Nikolaus
        // Haus path, timed to match the firmware's real holdFor(2000) pauses at each
        // vertex (scaled by the selected speed). It is not reading live encoder
        // position. For a true live view, the ESP32 needs to periodically send
        // something like "POS:x,y" during moveTo(), and this UI would need a
        // matching onmessage handler to consume it instead of replaying a script.
        let animationToken = 0; // incremented to cancel any in-flight animation

        const vectors = {
            nicholashaus: "60,170 240,170 240,70 60,70 60,170 240,70 150,10 60,70 240,170",
            star: "120,20 150,82 220,92 170,141 181,210 120,177 59,210 70,141 20,92 89,82 120,20",
            grid: "10,10 290,10 290,190 10,190 10,10 10,70 290,70 290,130 10,130 10,190 100,190 100,10 190,10 190,190"
        };

        // Nikolaus Haus path in machine mm, matching drawNikolausHouse() in firmware.
        // Each step is the move FROM the previous point TO "to", with pen state
        // during that move, and whether to pause (holdAfter) like holdFor(2000).
        const NIKOLAUS_START = [0, 0]; // local (0,0) = homed/parked position
        const NIKOLAUS_STEPS = [
            { to: [50, 50],   pen: 'up',   holdAfter: true },  // pen up move to A
            { to: [50, 50],   pen: 'down', holdAfter: true },  // pen down at A (no travel)
            { to: [50, 75],   pen: 'down', holdAfter: true },  // A -> B
            { to: [62.5, 90], pen: 'down', holdAfter: true },  // B -> C
            { to: [75, 75],   pen: 'down', holdAfter: true },  // C -> D
            { to: [50, 75],   pen: 'down', holdAfter: true },  // D -> B
            { to: [75, 50],   pen: 'down', holdAfter: true },  // B -> E
            { to: [50, 50],   pen: 'down', holdAfter: true },  // E -> A
            { to: [75, 75],   pen: 'down', holdAfter: true },  // A -> D
            { to: [75, 50],   pen: 'down', holdAfter: true },  // D -> E
            { to: [75, 50],   pen: 'up',   holdAfter: false }, // pen up at E
        ];

        // Maps machine mm coordinates to the 300x200 SVG viewBox.
        function mmToSvg(xmm, ymm) {
            const svgX = 30 + xmm * 2.6;
            const svgY = 190 - ymm * 1.8;
            return [svgX, svgY];
        }

        function setDrawStatusBadge(text, drawing) {
            const badge = document.getElementById("drawStatusBadge");
            badge.innerText = text;
            badge.classList.toggle("drawing", !!drawing);
        }

        function resetVisualizerPath() {
            document.getElementById("vector-path").setAttribute("points", "");
            const [sx, sy] = mmToSvg(NIKOLAUS_START[0], NIKOLAUS_START[1]);
            document.getElementById("pen-tip").setAttribute("cx", sx);
            document.getElementById("pen-tip").setAttribute("cy", sy);
        }

        function cancelDrawingAnimation() {
            animationToken++; // any running animation loop will see a stale token and stop
            setDrawStatusBadge("IDLE", false);
            document.getElementById("drawBtn").disabled = false;
        }

        // Simulated live-view replay of the Nikolaus Haus path.
        function animateNikolausHouse() {
            const myToken = ++animationToken;
            const drawBtn = document.getElementById("drawBtn");
            const penTip = document.getElementById("pen-tip");
            const pathEl = document.getElementById("vector-path");

            resetVisualizerPath();
            setDrawStatusBadge("DRAWING...", true);
            drawBtn.disabled = true;

            let points = []; // accumulated drawn points (pen-down segments only)
            let current = NIKOLAUS_START;

            // base speed at 1x, scaled by speedMultiplier
            const MM_PER_SEC = 25;       // nominal travel speed for the animation
            const HOLD_MS = 2000;        // matches firmware holdFor(2000)

            let stepIndex = 0;

            function runStep() {
                if (myToken !== animationToken) return; // cancelled (estop/reset/new run)
                if (stepIndex >= NIKOLAUS_STEPS.length) {
                    setDrawStatusBadge("DONE", false);
                    drawBtn.disabled = false;
                    return;
                }

                const step = NIKOLAUS_STEPS[stepIndex];
                const from = current;
                const to = step.to;
                const dx = to[0] - from[0];
                const dy = to[1] - from[1];
                const distMm = Math.sqrt(dx * dx + dy * dy);
                const travelMs = Math.max(80, (distMm / (MM_PER_SEC * speedMultiplier)) * 1000);

                const startTime = performance.now();

                function frame(now) {
                    if (myToken !== animationToken) return;
                    const t = Math.min(1, (now - startTime) / travelMs);
                    const ix = from[0] + dx * t;
                    const iy = from[1] + dy * t;
                    const [sx, sy] = mmToSvg(ix, iy);
                    penTip.setAttribute("cx", sx);
                    penTip.setAttribute("cy", sy);

                    if (step.pen === 'down') {
                        const livePoints = points.concat([[sx, sy]]);
                        pathEl.setAttribute("points", livePoints.map(p => p.join(",")).join(" "));
                    }

                    if (t < 1) {
                        requestAnimationFrame(frame);
                    } else {
                        current = to;
                        const [fx, fy] = mmToSvg(to[0], to[1]);
                        if (step.pen === 'down') {
                            points.push([fx, fy]);
                            pathEl.setAttribute("points", points.map(p => p.join(",")).join(" "));
                        }
                        stepIndex++;
                        const waitMs = step.holdAfter ? (HOLD_MS / speedMultiplier) : 0;
                        setTimeout(runStep, waitMs);
                    }
                }
                requestAnimationFrame(frame);
            }

            runStep();
        }

        function selectSpeed(val) {
            speedMultiplier = val;
            document.getElementById("speed-display").innerText = val + "x";
            document.querySelectorAll(".speed-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById("speedBtn-" + val).classList.add("active");

            // Sends as a percentage (50/100/200), same scale the old slider used.
            // NOTE: ESP32 firmware has no SPEED: handler yet -- this currently
            // affects the on-screen animation timing only, not real motor speed.
            if (socket && isConnected) {
                socket.send(`SPEED:${Math.round(val * 100)}`);
            }
            logToTerminal(`[SPEED]: Feedrate set to ${val}x`);
        }

        function initWebSocket() {
            if (socket) {
                socket.close();
            }

            const targetIp = document.getElementById('espIpInput').value.trim();
            if (!targetIp) {
                logToTerminal("<span class='alert-highlight'>[ERROR]: Connection aborted. Invalid or blank IP address.</span>");
                return;
            }

            logToTerminal(`[SYSTEM]: Linking stream to ws://${targetIp}:81/...`);
            socket = new WebSocket(`ws://${targetIp}:81/`);

            socket.onopen = () => {
                isConnected = true;
                activeEmergencyState = false;
                updateStatusBadge(true);
                logToTerminal(`<span class='success-highlight'>[ESP32]: WebSocket Connection Established with host node ${targetIp}!</span>`);
                if (autoReconnectInterval) {
                    clearInterval(autoReconnectInterval);
                    autoReconnectInterval = null;
                    logToTerminal("<span class='success-highlight'>[SYSTEM]: Auto-reconnection script disengaged successfully.</span>");
                }
            };
            socket.onclose = () => {
                isConnected = false;
                updateStatusBadge(false);
                logToTerminal("<span class='alert-highlight'>[ESP32]: Link connection dropped.</span>");
            };
            socket.onerror = () => {
                logToTerminal("<span class='alert-highlight'>[ERROR]: WebSocket connection error.</span>");
            };
            socket.onmessage = (event) => {
                logToTerminal(`[ESP32]: ${event.data}`);
            };
        }

        function logToTerminal(message) {
            const consoleLog = document.getElementById("terminal-console");
            consoleLog.innerHTML += "<br>" + message;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        function updateStatusBadge(status) {
            const badgeText = document.getElementById("espText");
            const badgeDot = document.getElementById("espDot");
            if (status) {
                badgeText.innerText = "ONLINE";
                badgeText.style.color = "var(--success)";
                badgeDot.style.backgroundColor = "var(--success)";
                badgeDot.style.boxShadow = "0 0 8px var(--success)";
            } else {
                badgeText.innerText = "OFFLINE";
                badgeText.style.color = "var(--danger)";
                badgeDot.style.backgroundColor = "var(--danger)";
                badgeDot.style.boxShadow = "0 0 8px var(--danger)";
            }
        }

        function switchTab(element, tabId) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function executeNicholasHaus() {
            logToTerminal("[COMMAND]: Requesting execution sequence for Nicholas Haus.");
            if (socket && isConnected) {
                socket.send("START");
            }
            animateNikolausHouse();
        }

        function sendDrive(direction) {
            logToTerminal(`[JOG]: Moving Axis -> ${direction}`);
            if (socket && isConnected) {
                if (direction === "HOME") {
                    socket.send("CALIBRATE");
                } else {
                    socket.send(`JOG_${direction}`);
                }
            }
        }

        function setPenState(state) {
            logToTerminal(`[PEN]: Adjusting position -> ${state}`);
            if (socket && isConnected) {
                socket.send(state === "UP" ? "PEN_UP" : "PEN_DOWN");
            }
        }

        function triggerEmergencyStop() {
            logToTerminal("<span class='alert-highlight'>[HALT]: EMERGENCY BREAK INTERRUPT TRIGGERED!</span>");
            if (socket && isConnected) {
                socket.send("M0");
            }
            cancelDrawingAnimation();
        }

        function triggerDeviceReset() {
            logToTerminal("[SYSTEM]: Dispatched hardware soft-reset request protocol.");
            if (socket && isConnected) {
                socket.send("RESET");
            }
            cancelDrawingAnimation();
            resetVisualizerPath();
        }

        function saveSettings() {
            logToTerminal("[SYSTEM]: Settings saved locally (not yet sent to device).");
        }

        function loadVector(name) {
            const pts = vectors[name];
            if (!pts) return;
            document.getElementById("vector-path").setAttribute("points", pts);
            switchTab(document.querySelector('.nav-item'), 'main');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector('.nav-item').classList.add('active');
        }

        // Initialize the pen-tip/path to the parked (0,0) position on load.
        resetVisualizerPath();
    </script>
</body>
</html>
